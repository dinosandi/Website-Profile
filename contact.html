         </div>

    <main>
        <div class="contactme">
            <div class="contact" data-aos="flip-right" data-aos-duration="1000">
                <h1>Contact Me</h1>
                <p>Please feel free to contact me </p>
                <h4>Your Information</h4>
    
                <form action="https://formsubmit.co/jadeishengui@gmail.com" autocomplete="off" method="post">
                        <div class="form-container">
                            <!-- Input Name Column -->
                            <div class="input-container">
                                <div class="icon">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div class="form-input">
                                    <input class="input-item" type="text" name="name" id="name" placeholder="">
                                    <label for="name" class="form-label">Name</label>
                                </div>
                            </div>
                        </div>
    
                        <!-- <1-- Input City Column -->
    
                        <div class="input-container">
                            <div class="icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="form-input">
                                <input class="input-item" type="text" name="city" id="city" placeholder=""> <label
                                    for="city" class="form-label">City</label>
                            </div>
                        </div>
                        <!-- Input Email Column -->
    
                        <div class="input-container">
                            <div class="icon">
                                <i class="far fa-envelope-open"></i>
                            </div>
                            <div class="form-input">
                                <input class="input-item" type="text" name="email" id="email" placeholder="">
                                <label for="email" class="form-label">Email</label>
                            </div>
                        </div>
                        <!-- Input Message Column -->
    
                        <div class="textarea-container">
                            <div class="icon">
                                <i class="fas fa-comment"></i>
                            </div>
                            <div class="form-textarea">
                                <textarea class="textarea" type="text" name="message" id="message" cols="52" rows="8"
                                    placeholder=""></textarea>
                                <label for="message" class="form-label">Message</label>
                            </div>
                        </div> 
                         <input type="submit" value="Send" class="submit">  
            </div>
            
            
                 </form>
                 
        </div>
        <div class="modal-container">
            <div class="modal">
                <img src="Assets/A veces solo déjate llevar por las cosas sencillas.jpg" alt="">
